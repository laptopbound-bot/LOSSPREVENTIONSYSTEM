<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginpass.css">
    <title>Document</title>
</head>
<body>
    <div id="main_container">
        <div id="container-left">
            <div id="logo">
                <img id="img1" src="shield.png" alt="">
            </div>
            <div id="text">
                <p id="p8">Loss Prevention System</p>
                <p id="p9">Intelligent Loss Prevention System for Small Businesses</p>
            </div>
            <div id="shop">
                <img id="img2" src="store.png" alt="">
            </div>
        </div>
        <div id="container-right">
            <div id="welc">
                <p id="p1">Welcome Back!</p>
                <p id="p2">Please login to your account</p>
            </div>
            <div class="userpass">
                <p class="p3">Username</p>
                <div class="infocontain">
                    <div class="icon1">
                        <img src="person.png" alt="">
                    </div>
                    <p class="p4">Enter your username</p>
                </div>
            </div>
            <div class="userpass">
                <p class="p3">Password</p>
                <div class="infocontain">
                    <div class="icon1">
                        <img src="lockblack.png" alt="">
                    </div>
                    <p class="p4">Enter your password</p>
                </div>
            </div>
            <div id="rmmbr">
                <div id="checkbox"></div>
                <p id="p5">Remember me</p>
            </div>
            <div id="loginbutton">
                <p id="p6"><a href="dashboard.html">Login</a></p>
            </div>
            <div id="last">
                <p id="p7">Forget password?</p>
            </div>
        </div>
    </div>
</body>
</html>
